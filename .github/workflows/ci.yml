name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - working-directory: api
        run: npm ci
      - working-directory: api
        run: npm test
      - run: node --check public/app.js
      - working-directory: api
        run: |
          npm start &
          sleep 2
          curl -fsS http://127.0.0.1:3000/health

  sdk-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r ml/requirements.txt
      - run: >-
          python -m py_compile
          sdk/ring_sound.py
          sdk/examples/capture_imu_jsonl.py
          sdk/examples/hmm_gesture_monitor.py
          ml/ringml/*.py
          ml/*.py
          ml/examples/*.py
          ml/simulation/*.py
      - run: python -m unittest discover -s sdk/tests -v
      - run: python -m unittest discover -s ml/tests -v
      - run: python sdk/ring_sound.py --help
