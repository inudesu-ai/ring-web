name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - working-directory: api
        run: npm install
      - working-directory: api
        run: |
          npm start &
          sleep 2
          curl -fsS http://127.0.0.1:3000/health
