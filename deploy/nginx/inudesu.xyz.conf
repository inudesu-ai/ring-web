server {
    listen 80;
    server_name inudesu.xyz www.inudesu.xyz;

    root /var/www/inudesu.xyz/public;
    index index.html;

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"ok":true,"service":"ring-web"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
